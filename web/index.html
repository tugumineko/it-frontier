<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>代码词法地图 · 看懂每个单词</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./css/style.css?v=3" />
</head>
<body>
  <div id="stars"></div>

  <header id="topbar">
    <div class="title">代码词法地图 <span class="sub">· 看懂每个单词</span></div>
    <div class="tagline">把代码切成 token 分到<b>关键字 / 标识符 / 运算符 / 字面量</b>四区，agent 逐个讲它在这里干嘛。</div>
  </header>

  <main id="stage">
    <!-- 左：代码面板 -->
    <aside id="code-panel">
      <div class="row">
        <select id="lang">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="c">C</option>
          <option value="cpp">C++</option>
          <option value="java">Java</option>
          <option value="go">Go</option>
        </select>
        <button id="btn-analyze" class="primary">▶ 分析</button>
      </div>
      <div class="samples">样例：<button data-eg="var">变量</button><button data-eg="if">条件</button><button data-eg="loop">循环</button><button data-eg="func">函数</button><button data-eg="poly">一词多义</button></div>
      <textarea id="code-input" rows="6" placeholder="粘贴一段代码，点「分析」。&#10;例如：&#10;def add(a, b):&#10;    return a + b"></textarea>
      <div class="hint" id="analyze-status">从 http://127.0.0.1:5000 打开。无凭据也能看词法分类，配 ECNU 凭据后有逐词解释。</div>
      <div id="code-view" class="codeview"></div>
    </aside>

    <!-- 中：2D 词法地图 -->
    <div id="map-wrap">
      <svg id="map" viewBox="0 0 1000 680" preserveAspectRatio="xMidYMid meet"></svg>
    </div>

    <!-- 右：控制 -->
    <aside id="panel">
      <section class="grp">
        <h3>视图</h3>
        <button id="toggle-links" class="seg active" style="width:100%">🔗 显示词法轨迹</button>
        <div class="hint">按代码顺序把 token 连成一条线，看代码读下来经过哪几类词。</div>
      </section>
      <section class="grp">
        <h3>数据</h3>
        <div class="row">
          <button id="btn-export" class="seg">💾 导出</button>
          <button id="btn-import" class="seg">📂 导入</button>
        </div>
        <input id="file-import" type="file" accept="application/json,.json" hidden />
      </section>
      <section class="grp">
        <h3>图例</h3>
        <div id="legend"></div>
      </section>
      <div class="ro-row" id="readout-mini"><span>token / 义项</span><b id="ro-count">—</b></div>
    </aside>
  </main>

  <div id="selcard" hidden></div>
  <div id="loading">就绪：粘贴代码，点分析…</div>

  <script type="module" src="./js/main.js?v=3"></script>
</body>
</html>
